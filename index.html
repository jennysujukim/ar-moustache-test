<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>AR Moustache</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
    }

    /* Video is hidden — frames are drawn directly onto the canvas */
    #video { display: none; }

    #canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    #status {
      position: fixed;
      bottom: max(32px, env(safe-area-inset-bottom, 32px));
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Segoe UI', sans-serif;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.55);
      letter-spacing: 0.05em;
      white-space: nowrap;
      pointer-events: none;
      text-shadow: 0 1px 4px rgba(0,0,0,0.6);
    }

    #status.ready { color: rgba(100, 255, 150, 0.9); }

    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.88);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 10;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
      transition: opacity 0.5s;
    }

    #overlay h2 { font-size: 20px; font-weight: 500; letter-spacing: 0.06em; }

    #overlay p {
      font-size: 13px;
      color: rgba(255,255,255,0.4);
      text-align: center;
      max-width: 260px;
      line-height: 1.6;
    }

    .spinner {
      width: 36px; height: 36px;
      border: 2px solid rgba(255,255,255,0.1);
      border-top-color: rgba(255,255,255,0.75);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .hidden { opacity: 0; pointer-events: none; }
  </style>
</head>
<body>

<video id="video" autoplay muted playsinline></video>
<canvas id="canvas"></canvas>
<div id="status">Initializing…</div>

<div id="overlay">
  <div class="spinner"></div>
  <h2>Loading AR Engine</h2>
  <p>Setting up face tracking and moustache overlay…</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

<script>
  const video   = document.getElementById('video');
  const canvas  = document.getElementById('canvas');
  const ctx     = canvas.getContext('2d');
  const overlay = document.getElementById('overlay');
  const status  = document.getElementById('status');

  // ── Landmarks ────────────────────────────────────────────────────────────────
  // 164 = philtrum (directly between nose base and upper lip) — correct moustache anchor
  // 13  = top center of upper lip
  // 129 = left nose wing, 358 = right nose wing (for width)
  const PHILTRUM   = 164;
  const UPPER_LIP  = 13;
  const LEFT_NOSE  = 129;
  const RIGHT_NOSE = 358;

  const moustacheImg = new Image();
  moustacheImg.src   = 'assets/moustache.png';

  let modelReady = false;
  let processing = false;

  // ── Canvas sizing ─────────────────────────────────────────────────────────────
  // Canvas pixel dims match the physical screen so landmark → pixel math is 1:1
  function resizeCanvas() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  // ── Cover-crop helpers ────────────────────────────────────────────────────────
  // Returns the source rect to crop from the video so it fills the canvas
  // with the same behaviour as object-fit: cover
  function getCrop(vW, vH, cW, cH) {
    const vR = vW / vH;
    const cR = cW / cH;
    let sw, sh, sx, sy;
    if (vR > cR) {
      // Video is wider → crop left & right sides
      sh = vH;
      sw = vH * cR;
      sx = (vW - sw) / 2;
      sy = 0;
    } else {
      // Video is taller → crop top & bottom
      sw = vW;
      sh = vW / cR;
      sx = 0;
      sy = (vH - sh) / 2;
    }
    return { sx, sy, sw, sh };
  }

  // Converts a MediaPipe landmark [0..1] to canvas pixel coordinates,
  // accounting for the cover crop and mirroring the X axis (front camera selfie view)
  function lmToCanvas(lm, vW, vH) {
    const cW = canvas.width, cH = canvas.height;
    const { sx, sy, sw, sh } = getCrop(vW, vH, cW, cH);
    const px = ((lm.x * vW) - sx) / sw * cW;
    const py = ((lm.y * vH) - sy) / sh * cH;
    return {
      x: cW - px,  // mirror X for front camera
      y: py,
    };
  }

  // ── Face Mesh ────────────────────────────────────────────────────────────────
  const faceMesh = new FaceMesh({
    locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`
  });

  faceMesh.setOptions({
    maxNumFaces:            1,
    refineLandmarks:        false,
    minDetectionConfidence: 0.5,
    minTrackingConfidence:  0.5,
  });

  faceMesh.onResults((results) => {
    processing = false;

    const vW = video.videoWidth;
    const vH = video.videoHeight;
    if (!vW || !vH) return;

    const cW = canvas.width;
    const cH = canvas.height;

    // ── 1. Draw video frame (cover-cropped + mirrored) ──────────────────────
    const { sx, sy, sw, sh } = getCrop(vW, vH, cW, cH);
    ctx.save();
    ctx.translate(cW, 0);
    ctx.scale(-1, 1);
    ctx.drawImage(video, sx, sy, sw, sh, 0, 0, cW, cH);
    ctx.restore();

    // ── 2. Reveal UI on first good frame ────────────────────────────────────
    if (!modelReady) {
      modelReady = true;
      overlay.classList.add('hidden');
      status.textContent = 'Position your face in the frame';
      status.classList.add('ready');
    }

    const faces = results.multiFaceLandmarks || [];

    if (faces.length === 0) {
      status.textContent = 'No face detected — move closer';
      status.classList.remove('ready');
      return;
    }

    status.textContent = 'Face detected — enjoy your moustache!';
    status.classList.add('ready');

    // ── 3. Draw moustache ────────────────────────────────────────────────────
    if (moustacheImg.complete && moustacheImg.naturalWidth > 0) {
      drawMoustache(faces[0], vW, vH);
    }
  });

  // ── Draw moustache ────────────────────────────────────────────────────────────
  function drawMoustache(landmarks, vW, vH) {
    // Philtrum (164) sits directly below the nose base — perfect top anchor
    // Upper lip top (13) is the bottom anchor
    // Center between them = the moustache sweet spot
    const philtrum  = lmToCanvas(landmarks[PHILTRUM],   vW, vH);
    const upperLip  = lmToCanvas(landmarks[UPPER_LIP],  vW, vH);
    const noseLeft  = lmToCanvas(landmarks[LEFT_NOSE],  vW, vH);
    const noseRight = lmToCanvas(landmarks[RIGHT_NOSE], vW, vH);

    const cx = (philtrum.x + upperLip.x) / 2;
    const cy = (philtrum.y + upperLip.y) / 2;

    const noseWidthPx = Math.hypot(
      noseRight.x - noseLeft.x,
      noseRight.y - noseLeft.y
    );
    const mW = noseWidthPx * 2.4;
    const mH = mW / (moustacheImg.naturalWidth / moustacheImg.naturalHeight);

    ctx.drawImage(moustacheImg, cx - mW / 2, cy - mH / 2, mW, mH);
  }

  // ── Camera ───────────────────────────────────────────────────────────────────
  async function startCamera() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: 'user',
          width:  { ideal: 1280 },
          height: { ideal: 720 },
        },
        audio: false,
      });
      video.srcObject = stream;
      await video.play();

      function sendFrame() {
        if (!processing && video.readyState >= 2 && video.videoWidth > 0) {
          processing = true;
          faceMesh.send({ image: video }).catch(() => { processing = false; });
        }
        requestAnimationFrame(sendFrame);
      }
      requestAnimationFrame(sendFrame);

    } catch (err) {
      overlay.innerHTML = `
        <h2 style="color:#ff6b6b">Camera Access Denied</h2>
        <p>${err.message}</p>
        <p>Please allow camera permission and reload the page.</p>`;
    }
  }

  // ── Boot ─────────────────────────────────────────────────────────────────────
  moustacheImg.onload  = startCamera;
  moustacheImg.onerror = () => startCamera();
</script>
</body>
</html>
