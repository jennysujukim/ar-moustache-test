<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AR Moustache</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
      overflow: hidden;
    }

    #app {
      position: relative;
      width: min(640px, 100vw);
      aspect-ratio: 4 / 3;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 0 60px rgba(255, 255, 255, 0.08);
    }

    #video {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }

    #canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }

    #status {
      margin-top: 20px;
      font-size: 14px;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.05em;
      min-height: 20px;
      transition: opacity 0.3s;
    }

    #status.ready {
      color: rgba(100, 255, 150, 0.8);
    }

    #overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 10;
      border-radius: 16px;
      transition: opacity 0.5s;
    }

    #overlay h2 {
      font-size: 20px;
      font-weight: 500;
      letter-spacing: 0.08em;
      opacity: 0.9;
    }

    #overlay p {
      font-size: 13px;
      color: rgba(255,255,255,0.45);
      text-align: center;
      max-width: 280px;
      line-height: 1.6;
    }

    .spinner {
      width: 36px; height: 36px;
      border: 2px solid rgba(255,255,255,0.1);
      border-top-color: rgba(255,255,255,0.7);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .hidden { opacity: 0; pointer-events: none; }
  </style>
</head>
<body>

<div id="app">
  <video id="video" autoplay muted playsinline></video>
  <canvas id="canvas"></canvas>

  <div id="overlay">
    <div class="spinner"></div>
    <h2>Loading AR Engine</h2>
    <p>Setting up face tracking and moustache overlay…</p>
  </div>
</div>

<div id="status">Initializing…</div>

<!-- MediaPipe Face Mesh -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

<script>
  const video   = document.getElementById('video');
  const canvas  = document.getElementById('canvas');
  const ctx     = canvas.getContext('2d');
  const overlay = document.getElementById('overlay');
  const status  = document.getElementById('status');

  const NOSE_BOTTOM = 94;
  const UPPER_LIP   = 13;
  const LEFT_NOSE   = 129;
  const RIGHT_NOSE  = 358;

  const moustacheImg = new Image();
  moustacheImg.src   = 'assets/moustache.png';

  let modelReady = false;
  let processing = false;

  // ── Face Mesh ────────────────────────────────────────────────────────────────
  const faceMesh = new FaceMesh({
    locateFile: (file) =>
      `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
  });

  faceMesh.setOptions({
    maxNumFaces:            1,
    refineLandmarks:        false, // lighter — works on mobile
    minDetectionConfidence: 0.5,
    minTrackingConfidence:  0.5,
  });

  // All drawing happens here — no separate render loop competing with this.
  faceMesh.onResults((results) => {
    processing = false;

    // Set canvas pixel dimensions once from the live video size
    if (!modelReady) {
      modelReady = true;
      canvas.width  = video.videoWidth;
      canvas.height = video.videoHeight;
      overlay.classList.add('hidden');
      status.textContent = 'Position your face in the frame';
      status.classList.add('ready');
    }

    const W = canvas.width;
    const H = canvas.height;
    const faces = results.multiFaceLandmarks || [];

    ctx.clearRect(0, 0, W, H);

    if (faces.length === 0) {
      status.textContent = 'No face detected — move closer';
      status.classList.remove('ready');
      return;
    }

    status.textContent = 'Face detected — enjoy your moustache!';
    status.classList.add('ready');

    if (moustacheImg.complete && moustacheImg.naturalWidth > 0) {
      drawMoustache(faces[0], W, H);
    }
  });

  // ── Camera ───────────────────────────────────────────────────────────────────
  async function startCamera() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: 'user',
          width:  { ideal: 640 },
          height: { ideal: 480 },
        },
        audio: false,
      });
      video.srcObject = stream;
      await video.play();

      // Feed frames to MediaPipe — one at a time (wait for result before next send)
      function sendFrame() {
        if (!processing && video.readyState >= 2 && video.videoWidth > 0) {
          processing = true;
          faceMesh.send({ image: video }).catch(() => { processing = false; });
        }
        requestAnimationFrame(sendFrame);
      }
      requestAnimationFrame(sendFrame);

    } catch (err) {
      overlay.innerHTML = `
        <h2 style="color:#ff6b6b">Camera Access Denied</h2>
        <p>${err.message}</p>
        <p>Please allow camera permission and reload the page.</p>`;
    }
  }

  // ── Draw ─────────────────────────────────────────────────────────────────────
  function drawMoustache(landmarks, W, H) {
    const noseBot  = landmarks[NOSE_BOTTOM];
    const upperLip = landmarks[UPPER_LIP];
    const noseL    = landmarks[LEFT_NOSE];
    const noseR    = landmarks[RIGHT_NOSE];

    // Video is CSS-mirrored (scaleX -1); flip x so canvas aligns with display
    const cx = ((1 - noseBot.x) + (1 - upperLip.x)) / 2 * W;
    const cy = (noseBot.y + upperLip.y) / 2 * H;

    const noseWidthPx = Math.abs(noseL.x - noseR.x) * W;
    const moustacheW  = noseWidthPx * 2.4;
    const imgAspect   = moustacheImg.naturalWidth / moustacheImg.naturalHeight;
    const moustacheH  = moustacheW / imgAspect;

    ctx.drawImage(
      moustacheImg,
      cx - moustacheW / 2,
      cy - moustacheH / 2,
      moustacheW,
      moustacheH
    );
  }

  // ── Boot ─────────────────────────────────────────────────────────────────────
  moustacheImg.onload  = startCamera;
  moustacheImg.onerror = () => startCamera();
</script>
</body>
</html>
