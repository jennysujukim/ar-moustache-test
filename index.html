<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AR Moustache</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
      overflow: hidden;
    }

    #app {
      position: relative;
      width: 640px;
      height: 480px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 0 60px rgba(255, 255, 255, 0.08);
    }

    #video {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }

    #canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }

    #status {
      margin-top: 20px;
      font-size: 14px;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.05em;
      min-height: 20px;
      transition: opacity 0.3s;
    }

    #status.ready {
      color: rgba(100, 255, 150, 0.8);
    }

    #overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 10;
      border-radius: 16px;
      transition: opacity 0.5s;
    }

    #overlay h2 {
      font-size: 20px;
      font-weight: 500;
      letter-spacing: 0.08em;
      opacity: 0.9;
    }

    #overlay p {
      font-size: 13px;
      color: rgba(255,255,255,0.45);
      text-align: center;
      max-width: 280px;
      line-height: 1.6;
    }

    .spinner {
      width: 36px; height: 36px;
      border: 2px solid rgba(255,255,255,0.1);
      border-top-color: rgba(255,255,255,0.7);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .hidden { opacity: 0; pointer-events: none; }
  </style>
</head>
<body>

<div id="app">
  <video id="video" autoplay muted playsinline></video>
  <canvas id="canvas"></canvas>

  <div id="overlay">
    <div class="spinner"></div>
    <h2>Loading AR Engine</h2>
    <p>Setting up face tracking and moustache overlay…</p>
  </div>
</div>

<div id="status">Initializing…</div>

<!-- MediaPipe Face Mesh -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

<script>
  const video   = document.getElementById('video');
  const canvas  = document.getElementById('canvas');
  const ctx     = canvas.getContext('2d');
  const overlay = document.getElementById('overlay');
  const status  = document.getElementById('status');

  // Landmark indices
  const NOSE_BOTTOM = 94;
  const UPPER_LIP   = 13;
  const MOUTH_LEFT  = 61;
  const MOUTH_RIGHT = 291;
  const LEFT_NOSE   = 129;
  const RIGHT_NOSE  = 358;

  const moustacheImg = new Image();
  moustacheImg.src   = 'assets/moustache.png';

  let modelReady = false;

  // ── EMA smoother ─────────────────────────────────────────────────────────────
  // Prevents jitter by blending new values toward the previous smoothed value.
  const SMOOTH = 0.35; // 0 = no smoothing, 1 = frozen
  const smooth = {};

  function ema(key, value) {
    if (smooth[key] === undefined) smooth[key] = value;
    smooth[key] = smooth[key] * SMOOTH + value * (1 - SMOOTH);
    return smooth[key];
  }

  // ── Face Mesh setup ──────────────────────────────────────────────────────────
  const faceMesh = new FaceMesh({
    locateFile: (file) =>
      `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
  });

  faceMesh.setOptions({
    maxNumFaces:            1,
    refineLandmarks:        true,
    minDetectionConfidence: 0.6,
    minTrackingConfidence:  0.6,
  });

  // Draw happens HERE — in the results callback, not in a separate rAF loop.
  // This avoids the race condition where canvas.width reset wipes an in-progress draw.
  faceMesh.onResults((results) => {
    if (!modelReady) {
      modelReady = true;
      // Set canvas size once here, after the video dimensions are known
      canvas.width  = video.videoWidth  || 640;
      canvas.height = video.videoHeight || 480;
      overlay.classList.add('hidden');
      status.textContent = 'Position your face in the frame';
      status.classList.add('ready');
    }

    const W = canvas.width;
    const H = canvas.height;

    ctx.clearRect(0, 0, W, H);

    const faces = results.multiFaceLandmarks || [];

    if (faces.length === 0) {
      status.textContent = 'No face detected — move closer';
      status.classList.remove('ready');
      return;
    }

    status.textContent = 'Face detected — enjoy your moustache!';
    status.classList.add('ready');

    if (moustacheImg.complete && moustacheImg.naturalWidth > 0) {
      drawMoustache(faces[0], W, H);
    }
  });

  // ── Camera ───────────────────────────────────────────────────────────────────
  async function startCamera() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { width: 640, height: 480, facingMode: 'user' },
        audio: false,
      });
      video.srcObject = stream;
      await video.play();

      const camera = new Camera(video, {
        onFrame: async () => {
          await faceMesh.send({ image: video });
        },
        width: 640,
        height: 480,
      });
      camera.start();
    } catch (err) {
      overlay.innerHTML = `
        <h2 style="color:#ff6b6b">Camera Access Denied</h2>
        <p>${err.message}</p>
        <p>Please allow camera permission and reload the page.</p>`;
    }
  }

  // ── Draw moustache ────────────────────────────────────────────────────────────
  function drawMoustache(landmarks, W, H) {
    const p = (idx) => landmarks[idx];

    const noseBot  = p(NOSE_BOTTOM);
    const upperLip = p(UPPER_LIP);
    const mouthL   = p(MOUTH_LEFT);
    const mouthR   = p(MOUTH_RIGHT);
    const noseL    = p(LEFT_NOSE);
    const noseR    = p(RIGHT_NOSE);

    // Video is CSS-mirrored (scaleX -1). MediaPipe sees the original unmirrored
    // frame. To align the canvas overlay with what the user sees, flip x:
    //   canvasX = (1 - landmark.x) * W
    const flip = (x) => 1 - x;

    // Center: midpoint between nose bottom and upper lip
    const rawCx = (flip(noseBot.x) + flip(upperLip.x)) / 2;
    const rawCy = (noseBot.y + upperLip.y) / 2;

    // Width from nose wing distance (mirrored, but the pixel distance is the same)
    const noseWidthPx = Math.abs(flip(noseR.x) - flip(noseL.x)) * W;
    const rawW = noseWidthPx * 2.4;

    // Roll: mirroring flips the x-axis so the angle sign inverts
    // Original angle: atan2(dy, dx) where dx = mouthR.x - mouthL.x
    // After mirror:  atan2(dy, -dx)  →  negate the angle
    const dx   = (mouthR.x - mouthL.x) * W;
    const dy   = (mouthR.y - mouthL.y) * H;
    const rawRoll = -Math.atan2(dy, dx);

    // Smooth all values to remove per-frame jitter
    const cx   = ema('cx',   rawCx)   * W;
    const cy   = ema('cy',   rawCy)   * H;
    const mW   = ema('mW',   rawW);
    const roll = ema('roll', rawRoll);

    const imgAspect = moustacheImg.naturalWidth / moustacheImg.naturalHeight;
    const mH = mW / imgAspect;

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(roll);
    ctx.globalAlpha = 0.95;
    ctx.drawImage(moustacheImg, -mW / 2, -mH / 2, mW, mH);
    ctx.restore();
  }

  // ── Boot ─────────────────────────────────────────────────────────────────────
  moustacheImg.onload  = startCamera;
  moustacheImg.onerror = () => {
    console.warn('assets/moustache.png failed to load');
    startCamera();
  };
</script>
</body>
</html>
